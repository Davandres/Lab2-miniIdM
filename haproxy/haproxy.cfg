# Copiar a /etc/haproxy/haproxy.cfg en la VM lb
#
# SELinux (Fedora): habilitar que haproxy pueda conectar a los backends:
#   sudo setsebool -P haproxy_connect_any on

global
    log         127.0.0.1 local2
    maxconn     4000
    daemon

defaults
    mode        tcp
    log         global
    option      tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend ldap_front
    bind *:636
    default_backend ldap_back

backend ldap_back
    balance roundrobin
    option tcp-check
    server ldap1 ldap1.fis.epn.ec:636 check
    server ldap2 ldap2.fis.epn.ec:636 check

listen stats
    bind *:9000
    mode http
    stats enable
    stats uri /haproxy?stats
    stats refresh 10s

# Copiar a /etc/httpd/conf.d/webserver-fis.conf
#
# IMPORTANTE (Fedora): el vhost por defecto de mod_ssl en
# /etc/httpd/conf.d/ssl.conf (VirtualHost _default_:443, cert autofirmado)
# compite por el puerto 443 y puede ganar por SNI. Comentarlo:
#   sudo sed -i '/<VirtualHost _default_:443>/,/<\/VirtualHost>/ s/^/#/' \
#     /etc/httpd/conf.d/ssl.conf
#
# SELinux: habilitar que Apache haga proxy saliente hacia Flask:
#   sudo setsebool -P httpd_can_network_connect on

<VirtualHost *:443>
    ServerName webserver.fis.epn.ec

    SSLEngine on
    SSLCertificateFile /etc/pki/tls/certs/web.crt
    SSLCertificateKeyFile /etc/pki/tls/private/web.key
    SSLCACertificateFile /etc/pki/tls/certs/ca.crt

    <Location "/">
        AuthType GSSAPI
        AuthName "FIS Kerberos Login"
        GssapiCredStore keytab:/etc/httpd/http.keytab
        Require valid-user

        ProxyPass "http://127.0.0.1:5000/"
        ProxyPassReverse "http://127.0.0.1:5000/"
        RequestHeader set X-Remote-User %{REMOTE_USER}s
    </Location>
</VirtualHost>
